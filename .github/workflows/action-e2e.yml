name: GitHub Action E2E

# Reusable workflow: release.yml calls this synchronously after the
# release is published so the 5 matrix jobs land in the release run's
# dependency graph (and `release-complete`) without dispatch+poll
# machinery. Also `workflow_dispatch`-able for ad-hoc reruns.

on:
  workflow_call:
    inputs:
      version:
        description: "Released version to exercise (e.g. v0.1.5). Empty/omit => 'latest'."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Released version to exercise (e.g. v0.1.5). Empty => 'latest'."
        type: string
        required: false
        default: ""

jobs:
  test-released-action:
    name: Test Released Action (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: dotsecenv/dotsecenv@v0
        with:
          version: ${{ inputs.version || 'latest' }}
      - run: dotsecenv version

  test-build-action:
    name: Test Build-From-Source Action (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: dotsecenv/dotsecenv@v0
        with:
          version: ${{ inputs.version || 'latest' }}
          build-from-source: true
      - run: dotsecenv version

  test-init-config-defaults:
    name: Test init-config with defaults
    runs-on: ubuntu-latest
    steps:
      - uses: dotsecenv/dotsecenv@v0
        with:
          version: ${{ inputs.version || 'latest' }}
          init-config: ''
      - run: dotsecenv version

  test-init-config-login:
    name: Test init-config --login
    runs-on: ubuntu-latest
    steps:
      - name: Generate GPG key
        id: gpg
        run: |
          cat > /tmp/gpg-key-params <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Subkey-Type: RSA
          Subkey-Length: 2048
          Name-Real: Test User 4
          Name-Email: test4@dotsecenv.com
          Expire-Date: 0
          EOF
          gpg --batch --gen-key /tmp/gpg-key-params
          FINGERPRINT=$(gpg --list-keys --with-colons test4@dotsecenv.com | grep '^fpr' | head -1 | cut -d: -f10)
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT
      - uses: dotsecenv/dotsecenv@v0
        with:
          version: ${{ inputs.version || 'latest' }}
          init-config: '--login ${{ steps.gpg.outputs.fingerprint }}'
      - run: dotsecenv version

  test-init-config-gpg-program:
    name: Test init-config --gpg-program
    runs-on: ubuntu-latest
    steps:
      - uses: dotsecenv/dotsecenv@v0
        with:
          version: ${{ inputs.version || 'latest' }}
          init-config: '--gpg-program /usr/bin/gpg'
      - run: dotsecenv version
