name: Lint workflows

# actionlint catches workflow syntax errors, broken `uses:` refs (local
# or remote), dangling `needs:`, undeclared inputs, invalid expressions,
# bad shell, and many other issues at PR-time. This is the only check
# that validates release.yml and e2e-action-post-release.yml on PR — both
# are tag-triggered or workflow_call-only and otherwise never fire
# pre-merge.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint*"

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
