name: Hermetic E2E

on:
  workflow_dispatch:
  # Invoked by release.yml as a reusable workflow so the release pipeline
  # gets the same hermeticity verification (harden-runner + strace) that
  # PRs do, without duplicating job definitions across workflows.
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/e2e.sh"
      - ".github/workflows/e2e-hermetic.yml"

permissions:
  contents: read

jobs:
  # Job 1: Build the binary once with network available.
  # The compiled bin/dotsecenv is consumed by `hermetic-harden-runner`,
  # which cannot fetch the Go toolchain itself (see job 2 comment).
  # `hermetic-strace-verified` does NOT consume this artifact — it
  # rebuilds from vendored sources so the compile step is also traced.
  setup:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build binary
        run: make build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            Makefile
            bin/dotsecenv
            scripts/e2e.sh
          retention-days: 1

  # Job 2: harden-runner enforcement on the e2e phase.
  # `egress-policy: block` must be the first step for tamper-resistance,
  # which means no later step can use the network — including
  # actions/setup-go (vendoring covers `go build`, not toolchain install).
  # So this job consumes the pre-built artifact from `setup` and only
  # exercises `make e2e`. Verifies zero egress during the e2e flow via
  # step-security's runtime egress interceptor.
  hermetic-harden-runner:
    name: Hermetic E2E (harden-runner)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          disable-sudo-and-containers: true

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: e2e-artifacts

      - name: Run hermetic e2e
        run: make e2e

  # Job 3: Network namespace + strace verification on build AND e2e.
  # Intentionally NOT `needs: setup` — we do checkout + setup-go BEFORE
  # entering `unshare --net`, then run `make build e2e` inside the
  # namespace so the compile step is also under syscall inspection.
  # Vendored modules (`go build -mod=vendor`) make the in-namespace
  # build possible without any network. Complements job 2: harden-runner
  # verifies egress at the application layer, strace + netns verify at
  # the kernel layer and additionally cover the compile step.
  hermetic-strace-verified:
    name: Hermetic E2E (strace + namespace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Run hermetic e2e with strace verification
        run: |
          # Run e2e in network namespace with strace tracing network syscalls
          sudo --preserve-env=PATH,GOROOT,GOPATH unshare --net bash -c '
            ip link set lo up
            echo "=== Network namespace active - only loopback ==="
            ip addr

            strace -f -e trace=network -o /tmp/network-syscalls.log make build e2e 2>&1
          '

          echo "=== Network Syscall Trace ==="
          cat /tmp/network-syscalls.log || true

          # Check for any connect() calls to non-loopback addresses
          EXTERNAL=$(grep -E "connect\(" /tmp/network-syscalls.log 2>/dev/null | grep -cvE "127.0.0.1|::1|AF_UNIX" || echo 0)
          echo "External connect() calls: $EXTERNAL"

          if [ "$EXTERNAL" -gt 0 ]; then
            echo "FAILED: External network syscalls detected"
            grep -E "connect\(" /tmp/network-syscalls.log | grep -v "127.0.0.1" | grep -v "::1" | grep -v "AF_UNIX" || true
            exit 1
          fi

          echo "PASSED: Zero external network syscalls verified by strace"

      - name: Upload strace log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: network-syscall-trace
          path: /tmp/network-syscalls.log
          retention-days: 30
