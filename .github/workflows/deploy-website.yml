name: Deploy Website

# Triggers:
# - push to main when website/** changes (out-of-band site updates)
# - workflow_call from release.yml on tag pushes (so the release run's
#   graph shows the deploy as a nested job — single source of truth for
#   the build/deploy logic)
# - workflow_dispatch for manual reruns
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_call: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: website/package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          # Exact pin: the action's bundled pnpm crashes self-updating to 11.12.0
          version: 11.11.0

      - name: Install dependencies
        run: make install

      - name: Build website
        run: make build
        env:
          # On a tag push, github.ref_name is the tag (e.g. v0.6.1).
          # On a branch push or workflow_dispatch, this is empty so the build
          # uses whatever default the site config decides (matches the
          # pre-migration behavior of dotsecenv/website's deploy workflow).
          DOTSECENV_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: website/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
