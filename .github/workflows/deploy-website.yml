name: Deploy Website

# Triggers:
# - push to main when website/** changes (out-of-band site updates)
# - workflow_call from release.yml on tag pushes (so the release run's
#   graph shows the deploy as a nested job — single source of truth for
#   the build/deploy logic)
# - workflow_dispatch for manual reruns
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_call: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: website/package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies
        run: make install

      - name: Build website
        run: make build
        env:
          # On a tag push, github.ref_name is the tag (e.g. v0.6.1).
          # On a branch push or workflow_dispatch, this is empty so the build
          # uses whatever default the site config decides (matches the
          # pre-migration behavior of dotsecenv/website's deploy workflow).
          DOTSECENV_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
