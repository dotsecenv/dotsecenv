name: CI Plugin

on:
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/ci-plugin.yml"
  pull_request:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/ci-plugin.yml"

permissions: {}

jobs:
  shell-tests:
    name: Shell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install fish (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-add-repository ppa:fish-shell/release-3 -y
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Install bash 5 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test plugins
        run: make test-plugins

      - name: Test plugin managers (Linux)
        if: runner.os == 'Linux'
        run: make test-managers
