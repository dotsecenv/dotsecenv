name: CI Plugin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/ci-plugin.yml"
  pull_request:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/ci-plugin.yml"

permissions: {}

jobs:
  shell-tests:
    name: Shell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install fish (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-add-repository ppa:fish-shell/release-3 -y
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Install bash 5 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test plugins
        run: make test-plugins

      # `make test-managers` is intentionally not run here. It builds a Docker
      # image and runs `git clone /opt/dotsecenv-plugin` inside it, which only
      # works when plugin/ is its own git repo. In the monorepo plugin/ is a
      # subdirectory and has no .git, so the clone fails. The plugin satellite
      # (dotsecenv/plugin) continues to run `make test-managers` on every push
      # via its own ci.yml, and the release pipeline pushes the latest source
      # there before tagging — so the integration coverage is preserved.
