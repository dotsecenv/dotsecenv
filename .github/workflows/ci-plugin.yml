name: CI Plugin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/ci-plugin.yml"
  pull_request:
    branches: [main]
    paths:
      - "plugin/**"
      - ".github/workflows/ci-plugin.yml"

permissions: {}

jobs:
  shell-tests:
    name: Shell tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu covers both fish majors via the fish-shell PPAs. macOS
          # (Homebrew) only ships the current major, so it tracks fish 4.x.
          - os: ubuntu-latest
            label: ubuntu / fish 3.x
            fish_ppa: ppa:fish-shell/release-3
          - os: ubuntu-latest
            label: ubuntu / fish 4.x
            fish_ppa: ppa:fish-shell/release-4
          - os: macos-latest
            label: macos / fish 4.x
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Install fish (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-add-repository ${{ matrix.fish_ppa }} -y
          sudo apt-get update
          sudo apt-get install -y fish
          fish --version

      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install fish
          fish --version

      - name: Install bash 5 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test plugins
        run: make test-plugins

      # `make test-managers` is intentionally not run here. It builds a Docker
      # image and runs `git clone /opt/dotsecenv-plugin` inside it, which only
      # works when plugin/ is its own git repo. In the monorepo plugin/ is a
      # subdirectory and has no .git, so the clone fails. The plugin satellite
      # (dotsecenv/plugin) continues to run `make test-managers` on every push
      # via its own ci.yml, and the release pipeline pushes the latest source
      # there before tagging — so the integration coverage is preserved.
