name: Contrib E2E

on:
  push:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "scripts/e2e-install.sh"
      - "scripts/e2e-terraform.sh"
      - "contrib/**"
      - ".github/workflows/contrib-e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "scripts/e2e-install.sh"
      - "scripts/e2e-terraform.sh"
      - "contrib/**"
      - ".github/workflows/contrib-e2e.yml"
  workflow_dispatch:

jobs:
  e2e-install:
    name: Install Script E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Run install.sh E2E tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make e2e-install

  e2e-terraform:
    name: Terraform Credentials Helper E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - uses: hashicorp/setup-terraform@v4

      - run: terraform version

      - run: make build e2e-terraform
