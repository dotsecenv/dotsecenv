name: _discover-gpg-subkey

# One-shot helper. After it prints the signing subkey fingerprint:
#   1. Copy the value from the run output
#   2. Set repo variable GPG_SIGNING_SUBKEY_FINGERPRINT to that value
#      (Settings -> Secrets and variables -> Actions -> Variables tab)
#   3. Delete this workflow file
#
# Manual trigger only.

on:
  workflow_dispatch:

permissions: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Print signing-capable subkey fingerprints
        run: |
          set -euo pipefail
          echo "=== gpg --list-secret-keys --with-colons (filtered) ==="
          gpg --list-secret-keys --with-colons \
            | awk -F: '
                /^sec/   { print "primary keyid:    ", $5; primary_caps=$12 }
                /^fpr/   { print "primary fpr:      ", $10; nextfpr_is_ssb=0; if (last=="ssb") nextfpr_is_ssb=1 }
                /^ssb/   { print "subkey  keyid:    ", $5, "caps:", $12; last="ssb" }
              '
          echo
          echo "=== signing subkey fingerprint (use this for vars.GPG_SIGNING_SUBKEY_FINGERPRINT) ==="
          # Walk colon output and pair each ssb with its following fpr line.
          gpg --list-secret-keys --with-colons \
            | awk -F: '
                /^ssb/ { caps=$12; want=(caps ~ /s/); next }
                /^fpr/ && want { print $10; want=0 }
              '
