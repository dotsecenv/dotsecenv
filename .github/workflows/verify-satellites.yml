name: Verify Satellite Drift

# Reconcile the published satellite repos (dotsecenv/plugin,
# dotsecenv/packages) against the monorepo source at the SHA each
# satellite says it was last published from.
#
# Why a separate workflow (and not part of release.yml)?
#   The release pipeline already shipped binaries, packaged assets,
#   tagged the satellites, and built the docs site by the time we get
#   here. The user-visible release is DONE. Verification is a
#   reconciliation check — useful signal, not a release gate. If we
#   ran it inside release.yml, a transient drift (or a bug in the
#   verifier itself) could mark a perfectly good release red. Living
#   in its own workflow keeps the release graph clean and lets us
#   iterate on the verifier without touching the release path.
#
# Reference SHA precedence (highest to lowest):
#   1. workflow_dispatch input `sha` (explicit operator override)
#   2. workflow_run.head_sha (the tag commit the upstream Release
#      just published — newest known publish SHA)
#   3. The Source-SHA trailer in the satellite's HEAD commit body
#      (the satellite's authoritative claim of which monorepo commit
#      it was last published from), parsed via
#      `git interpret-trailers --parse`.
#
# Crucially, we do NOT default to `github.sha`. That would be the
# main HEAD when the workflow fires, which can be ahead of the last
# release — main is allowed to move between releases without the
# satellites moving with it, so comparing the satellite against
# main HEAD would produce false drift every time the workflow ran
# off-cycle.
#
# Failure UX: the workflow goes red. GitHub's built-in failure
# notification (email to the actor + workflow watchers) is enough
# signal — no separate issue tracker plumbing.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

  workflow_dispatch:
    inputs:
      sha:
        description: "Monorepo SHA to verify satellites against (default: each satellite's own Source-SHA trailer)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  # Gate on the upstream release succeeding. If release.yml failed,
  # the satellite publishes may have been skipped (publish-{plugin,
  # packages} use `if: !failure() && !cancelled()`), so the satellite
  # legitimately wouldn't have moved — verifying against the release
  # SHA would report false drift.
  verify:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - satellite: plugin
            repo: dotsecenv/plugin
            source_dir: plugin
          - satellite: packages
            repo: dotsecenv/packages
            source_dir: packages
    steps:
      # Satellite goes first because we may need to read its Source-SHA
      # trailer to decide which monorepo commit to compare against.
      - name: Checkout ${{ matrix.repo }} satellite
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          path: satellite
          fetch-depth: 1

      - name: Resolve monorepo SHA to verify against
        id: sha
        env:
          INPUT_SHA: ${{ inputs.sha }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "${INPUT_SHA}" ]; then
            SHA="${INPUT_SHA}"
            SRC="workflow_dispatch input"
          elif [ -n "${WR_SHA}" ]; then
            SHA="${WR_SHA}"
            SRC="upstream Release run head_sha"
          elif [ -d satellite/.git ]; then
            SHA=$(git -C satellite log -1 --format=%B \
              | git interpret-trailers --parse \
              | awk -F': ' '$1=="Source-SHA"{print $2}')
            if [ -z "${SHA}" ]; then
              echo "::error::Satellite HEAD commit has no Source-SHA trailer"
              exit 1
            fi
            SRC="satellite Source-SHA trailer"
          else
            echo "::error::No SHA source available (no input, no workflow_run, no satellite git history)"
            exit 1
          fi
          echo "Reference SHA: ${SHA} (from ${SRC})"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout monorepo @ ${{ steps.sha.outputs.sha }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.sha.outputs.sha }}
          path: monorepo

      # The packages satellite is published with a retracted.txt
      # generated from go.mod at publish time. The monorepo source
      # tree at the release SHA does NOT contain that file, so we
      # regenerate it here into the source tree using the same
      # script the publish flow uses — now the verify can do a
      # full byte-identity check including retracted.txt instead of
      # whitelisting it.
      - name: Set up Go (for extract-retracted.sh)
        if: matrix.satellite == 'packages'
        uses: actions/setup-go@v6
        with:
          go-version-file: monorepo/go.mod
          cache: false

      - name: Regenerate packages/retracted.txt from go.mod
        if: matrix.satellite == 'packages'
        working-directory: monorepo
        run: ./scripts/extract-retracted.sh go.mod > packages/retracted.txt

      - name: Verify ${{ matrix.satellite }} satellite
        env:
          SOURCE_DIR: monorepo/${{ matrix.source_dir }}
          SATELLITE_DIR: satellite
          EXPECTED_SHA: ${{ steps.sha.outputs.sha }}
        run: monorepo/scripts/release/verify-satellite.sh
