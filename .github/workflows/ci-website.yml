name: CI Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/ci-website.yml"
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/ci-website.yml"

permissions: {}

jobs:
  build:
    name: Astro build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: website/package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies
        run: make install

      - name: Build website
        run: make build
