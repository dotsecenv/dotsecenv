name: CI

# Pipeline shape (DAG):
#
#   test ─► e2e ─► e2e-terraform ─┬─► e2e-action-default-args ─┬─► build-docs
#                                 └─► e2e-action-init-config
#
# Scoped to Go-related changes via `paths:` allowlist below — touches to
# website/, plugin/, docs-only files, etc. don't fire this pipeline.
# scripts/install.sh is excluded because e2e-install.yml owns that path
# independently (install.sh fetches its binary from GH releases — no
# local Go build needed).
#
# Sibling workflows, all path-scoped to their own area:
#   ci-plugin.yml    — plugin/ shell tests
#   ci-website.yml   — website/ Astro build
#   ci-release.yml   — `make release-test` snapshot, on goreleaser-config changes
#   e2e-install.yml  — scripts/install.sh smoke
#   e2e-hermetic.yml — hermetic-mode e2e on PR
#   e2e-action.yml   — released-action smoke (called from release.yml)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "!scripts/install.sh"
      - "!scripts/e2e-install.sh"
      - "contrib/**"
      - "examples/**"
      - "recipes/**"
      - "demos/**"
      - "action.yml"
      - ".goreleaser.yaml"
      - ".golangci.yaml"
      - "tools.go"
      # Any workflow change should re-run the canonical Go DAG —
      # workflow edits can break callsites or assumptions that the Go
      # tests would otherwise miss. Excludes plugin/website workflows
      # (orthogonal scopes; they self-trigger).
      - ".github/workflows/**"
      - "!.github/workflows/ci-plugin.yml"
      - "!.github/workflows/ci-website.yml"
      - "!.github/workflows/deploy-website.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "!scripts/install.sh"
      - "!scripts/e2e-install.sh"
      - "contrib/**"
      - "examples/**"
      - "recipes/**"
      - "demos/**"
      - "action.yml"
      - ".goreleaser.yaml"
      - ".golangci.yaml"
      - "tools.go"
      # Any workflow change should re-run the canonical Go DAG —
      # workflow edits can break callsites or assumptions that the Go
      # tests would otherwise miss. Excludes plugin/website workflows
      # (orthogonal scopes; they self-trigger).
      - ".github/workflows/**"
      - "!.github/workflows/ci-plugin.yml"
      - "!.github/workflows/ci-website.yml"
      - "!.github/workflows/deploy-website.yml"

jobs:
  test:
    name: Lint, Build, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make clean lint build test

  test-windows:
    name: Build, Test (windows-latest)
    runs-on: windows-latest
    if: false # Windows support is WIP https://github.com/dotsecenv/dotsecenv/issues/8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build
        run: go build -ldflags "-s -w" -o bin/dotsecenv.exe ./cmd/dotsecenv

      - name: Test
        run: go test -v -p 1 ./...

  e2e:
    name: E2E Tests (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build e2e

  e2e-terraform:
    name: E2E Terraform Credentials Helper (${{ matrix.os }})
    needs: e2e
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - uses: hashicorp/setup-terraform@v4

      - run: terraform version

      - run: make build e2e-terraform

  e2e-action-default-args:
    name: E2E Action default-args (${{ matrix.os }})
    needs: e2e-terraform
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true

      - run: dotsecenv version

  e2e-action-init-config:
    name: E2E Action init-config (${{ matrix.os }})
    needs: e2e-terraform
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true
          init-config: ""

      - run: dotsecenv version

  build-docs:
    name: Build Docs (${{ matrix.os }})
    needs: [e2e-action-default-args, e2e-action-init-config]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build completions docs man
