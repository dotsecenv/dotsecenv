name: CI

# Pipeline shape (DAG):
#
#   test  ──►  e2e  ──►  e2e-terraform  ──┬──►  docs  ──►  release-test (PR only)
#                                         │
#                                         ├──►  action
#                                         │     (matrix os)
#                                         │
#                                         └──►  action-init-config
#                                               (matrix os)
#
# Each step gates on the previous one(s) succeeding. action and
# action-init-config run in parallel after e2e-terraform; docs then waits
# on both. release-test only runs on PRs and is the last gate.

on:
  push:
    branches: [main]
    paths-ignore:
      - "plugin/**"
      - "website/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "plugin/**"
      - "website/**"

jobs:
  test:
    name: Lint, Build, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make clean lint build test

  test-windows:
    name: Build, Test (windows-latest)
    runs-on: windows-latest
    if: false # Windows support is WIP https://github.com/dotsecenv/dotsecenv/issues/8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build
        run: go build -ldflags "-s -w" -o bin/dotsecenv.exe ./cmd/dotsecenv

      - name: Test
        run: go test -v -p 1 ./...

  e2e:
    name: E2E Tests (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build e2e

  e2e-terraform:
    name: E2E Terraform Credentials Helper (${{ matrix.os }})
    needs: e2e
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - uses: hashicorp/setup-terraform@v4

      - run: terraform version

      - run: make build e2e-terraform

  action:
    name: Test Action (${{ matrix.os }})
    needs: e2e-terraform
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true

      - run: dotsecenv version

  action-init-config:
    name: Test Action with init config (${{ matrix.os }})
    needs: e2e-terraform
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true
          init-config: ""

      - run: dotsecenv version

  docs:
    name: Generate Docs (${{ matrix.os }})
    needs: [action, action-init-config]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build completions docs man

  release-test:
    name: Release Test
    needs: docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make release-test
