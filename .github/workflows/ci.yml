name: CI

# Pipeline shape (DAG):
#
#   test (matrix) ─┐
#                  ├─► e2e (matrix)
#                  ├─► e2e-terraform
#   build-docs ────┤─► e2e-git-credential
#                  ├─► e2e-action-default-args
#                  └─► e2e-action-init-config
#
# `test` and `build-docs` are the two roots — both fast, both build the
# binary, and they run in parallel so the slower of the two sets the
# critical path's first stage. Everything downstream gates on BOTH.
# Single-os (ubuntu) jobs: e2e-terraform, e2e-git-credential, e2e-action-*, build-docs.
# Matrix (ubuntu+macos): test, e2e.
#
# Scoped to Go-related changes via `paths:` allowlist below — touches to
# website/, plugin/, docs-only files, etc. don't fire this pipeline.
# scripts/install.sh is excluded because e2e-install.yml owns that path
# independently (install.sh fetches its binary from GH releases — no
# local Go build needed).
#
# Sibling workflows, all path-scoped to their own area:
#   ci-plugin.yml    — plugin/ shell tests
#   ci-website.yml   — website/ Astro build
#   ci-release.yml   — `make release-test` snapshot, on goreleaser-config changes
#   e2e-install.yml  — scripts/install.sh smoke
#   e2e-hermetic.yml — hermetic-mode e2e on PR
#   e2e-action-post-release.yml — post-release smoke for the released action ref

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "!scripts/install.sh"
      - "!scripts/e2e-install.sh"
      - "contrib/**"
      - "examples/**"
      - "demos/**"
      - "action.yml"
      - ".goreleaser.yaml"
      - ".golangci.yaml"
      - "tools.go"
      # Any workflow change should re-run the canonical Go DAG —
      # workflow edits can break callsites or assumptions that the Go
      # tests would otherwise miss. Excludes plugin/website workflows
      # (orthogonal scopes; they self-trigger).
      - ".github/workflows/**"
      - "!.github/workflows/ci-plugin.yml"
      - "!.github/workflows/ci-website.yml"
      - "!.github/workflows/deploy-website.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "!scripts/install.sh"
      - "!scripts/e2e-install.sh"
      - "contrib/**"
      - "examples/**"
      - "demos/**"
      - "action.yml"
      - ".goreleaser.yaml"
      - ".golangci.yaml"
      - "tools.go"
      # Any workflow change should re-run the canonical Go DAG —
      # workflow edits can break callsites or assumptions that the Go
      # tests would otherwise miss. Excludes plugin/website workflows
      # (orthogonal scopes; they self-trigger).
      - ".github/workflows/**"
      - "!.github/workflows/ci-plugin.yml"
      - "!.github/workflows/ci-website.yml"
      - "!.github/workflows/deploy-website.yml"

permissions: {}

jobs:
  test:
    name: Lint, Build, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make clean lint build test

  test-windows:
    name: Build, Test (windows-latest)
    runs-on: windows-latest
    # WIP — set repo var `ENABLE_WINDOWS_CI=true` to opt in.
    # https://github.com/dotsecenv/dotsecenv/issues/8
    if: ${{ vars.ENABLE_WINDOWS_CI == 'true' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build
        run: go build -ldflags "-s -w" -o bin/dotsecenv.exe ./cmd/dotsecenv

      - name: Test
        run: go test -v -p 1 ./...

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build completions docs man

  e2e:
    name: E2E Tests (${{ matrix.os }})
    needs: [test, build-docs]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build e2e

  e2e-terraform:
    name: E2E Terraform Credentials Helper
    needs: [test, build-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1

      - run: terraform version

      - run: make build e2e-terraform

  e2e-git-credential:
    name: E2E Git Credential Helper
    needs: [test, build-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build e2e-git-credential

  e2e-action-default-args:
    name: E2E Action default-args
    needs: [test, build-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true

      - run: dotsecenv version

  e2e-action-init-config:
    name: E2E Action init-config
    needs: [test, build-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true
          init-config: ""

      - run: dotsecenv version
