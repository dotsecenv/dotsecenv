name: CI

# Pipeline shape (DAG):
#
#   test ─► e2e ─► e2e-terraform ─┬─► action ──────────┬─► docs ─► release-test (PR only)
#                                 └─► action-init-config
#
# Scoped to Go-related changes via `paths:` allowlist below — touches to
# website/, plugin/, docs-only files, etc. don't fire this pipeline.
# scripts/install.sh is excluded because e2e-install.yml owns that path
# independently (install.sh fetches its binary from GH releases — no
# local Go build needed).
# Plugin and website have their own ci-plugin.yml / ci-website.yml.

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "!scripts/install.sh"
      - "!scripts/e2e-install.sh"
      - "contrib/**"
      - "examples/**"
      - "recipes/**"
      - "demos/**"
      - "action.yml"
      - ".goreleaser.yaml"
      - ".golangci.yaml"
      - "tools.go"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "vendor/**"
      - "Makefile"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "!scripts/install.sh"
      - "!scripts/e2e-install.sh"
      - "contrib/**"
      - "examples/**"
      - "recipes/**"
      - "demos/**"
      - "action.yml"
      - ".goreleaser.yaml"
      - ".golangci.yaml"
      - "tools.go"
      - ".github/workflows/ci.yml"

jobs:
  test:
    name: Lint, Build, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make clean lint build test

  test-windows:
    name: Build, Test (windows-latest)
    runs-on: windows-latest
    if: false # Windows support is WIP https://github.com/dotsecenv/dotsecenv/issues/8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build
        run: go build -ldflags "-s -w" -o bin/dotsecenv.exe ./cmd/dotsecenv

      - name: Test
        run: go test -v -p 1 ./...

  e2e:
    name: E2E Tests (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build e2e

  e2e-terraform:
    name: E2E Terraform Credentials Helper (${{ matrix.os }})
    needs: e2e
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - uses: hashicorp/setup-terraform@v4

      - run: terraform version

      - run: make build e2e-terraform

  action:
    name: Test Action (${{ matrix.os }})
    needs: e2e-terraform
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true

      - run: dotsecenv version

  action-init-config:
    name: Test Action with init config (${{ matrix.os }})
    needs: e2e-terraform
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          version: ${{ github.sha }}
          build-from-source: true
          init-config: ""

      - run: dotsecenv version

  docs:
    name: Generate Docs (${{ matrix.os }})
    needs: [action, action-init-config]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make build completions docs man

  release-test:
    name: Release Test
    needs: docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - run: make release-test
