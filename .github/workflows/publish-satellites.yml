name: Publish Satellites

# Manual / ad-hoc publish of plugin/ or packages/ source from this
# monorepo to its respective satellite repo, outside of the release
# pipeline. Use this when you need to ship a Renovate update, a doc
# fix in packages/README.md, or any other change that doesn't
# warrant cutting a new dotsecenv release tag.
#
# On a real release, release.yml's publish-plugin and publish-packages
# jobs handle the same push (and additionally tag the satellite with
# the release version). This workflow leaves the satellite untagged.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which satellite(s) to publish source to"
        type: choice
        required: true
        default: both
        options:
          - packages
          - plugin
          - both

permissions:
  contents: read

jobs:
  publish-packages:
    if: inputs.target == 'packages' || inputs.target == 'both'
    runs-on: ubuntu-latest
    outputs:
      packages_run_id: ${{ steps.find_packages.outputs.run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Capture pre-push timestamp
        id: timestamp
        run: |
          echo "push_time=$(date -u -d '5 seconds ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Go (for extract-retracted.sh)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Generate retracted.txt from go.mod
        run: |
          ./scripts/extract-retracted.sh go.mod > packages/retracted.txt
          echo "Retracted versions being published:"
          cat packages/retracted.txt || echo "(none)"

      - name: Generate App token (packages only)
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: packages

      # No `tag:` input — ad-hoc publishes shouldn't clutter the satellite
      # with refs. Source-Tag is omitted from the body for the same reason:
      # there's no release tag this commit corresponds to.
      - name: Publish packages source to satellite (no tag)
        uses: releasetools/actions/signed-push@57073d3d58774563dfaa76eaaf89ae086c278ee3  # v0.0.2
        with:
          source-dir: packages
          target-repo: dotsecenv/packages
          target-branch: main
          headline: "publish: ad-hoc (${{ github.sha }})"
          body: |
            Source-Commit: dotsecenv/dotsecenv@${{ github.sha }}
            Source-SHA: ${{ github.sha }}
            Source-Path: packages
            Published-By: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Find satellite publish.yml run
        id: find_packages
        env:
          SATELLITE_REPO: dotsecenv/packages
          WORKFLOW_FILE: publish.yml
          SINCE: ${{ steps.timestamp.outputs.push_time }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/find-satellite-run.sh

  wait-publish-packages:
    needs: publish-packages
    if: inputs.target == 'packages' || inputs.target == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Generate App token (packages, actions:read needed)
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: packages

      - name: Watch packages publish run
        env:
          SATELLITE_REPO: dotsecenv/packages
          RUN_ID: ${{ needs.publish-packages.outputs.packages_run_id }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/watch-satellite-run.sh

  publish-plugin:
    if: inputs.target == 'plugin' || inputs.target == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Generate App token (plugin only)
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: plugin

      - name: Publish plugin source to satellite (no tag)
        uses: releasetools/actions/signed-push@57073d3d58774563dfaa76eaaf89ae086c278ee3  # v0.0.2
        with:
          source-dir: plugin
          target-repo: dotsecenv/plugin
          target-branch: main
          headline: "publish: ad-hoc (${{ github.sha }})"
          body: |
            Source-Commit: dotsecenv/dotsecenv@${{ github.sha }}
            Source-SHA: ${{ github.sha }}
            Source-Path: plugin
            Published-By: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          token: ${{ steps.app-token.outputs.token }}

  # Mirror release.yml's test-plugin-managers gate. The plugin satellite
  # has no CI of its own, so verification happens here in the monorepo
  # by running `make test-managers-remote` — which clones the just-
  # pushed plugin source from github.com/dotsecenv/plugin in Docker and
  # exercises the install path real users experience. If install is
  # broken on the satellite, this job fails and the workflow run is red.
  test-plugin-managers:
    needs: publish-plugin
    if: inputs.target == 'plugin' || inputs.target == 'both'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run plugin manager integration tests (remote)
        working-directory: plugin
        run: make test-managers-remote
