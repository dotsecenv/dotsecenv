name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Job 1: Build artifacts (with network)
  setup-hermetic:
    name: Build E2E Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build binary
        run: make build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-e2e-artifacts
          path: |
            Makefile
            bin/dotsecenv
            scripts/e2e.sh
          retention-days: 1

  # Job 2: Hermetic E2E (network blocked)
  test-hermetic:
    name: Hermetic E2E Verification
    needs: setup-hermetic
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          disable-sudo-and-containers: true

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-e2e-artifacts

      - name: Run hermetic e2e
        run: make e2e

  goreleaser:
    needs: test-hermetic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Install Signing Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Setup GPG key
        id: setup_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          GPG_KEY_FILE="${{ runner.temp }}/gpg.key"
          echo "$GPG_PRIVATE_KEY" > "$GPG_KEY_FILE"
          chmod 600 "$GPG_KEY_FILE"
          echo "GPG_KEY_FILE=$GPG_KEY_FILE" >> $GITHUB_ENV

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Generate App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            homebrew-tap
            packages

      - name: Install Syft
        uses: anchore/sbom-action@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG_TOKEN: ${{ steps.app-token.outputs.token }}
          GPG_KEY_FILE: ${{ env.GPG_KEY_FILE }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Attest Build Provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

  notarize-macos:
    needs: goreleaser
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="dotsecenv_${VERSION#v}_Darwin_${{ matrix.arch }}.tar.gz"

          # Download archive and extract to separate directory
          gh release download "$VERSION" --pattern "$ARCHIVE" --dir .
          mkdir -p archive-contents
          tar -xzf "$ARCHIVE" -C archive-contents

      - name: Sign and notarize
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/notarize-macos.sh ./archive-contents/dotsecenv

      - name: Re-package and re-sign archive
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="dotsecenv_${VERSION#v}_Darwin_${{ matrix.arch }}.tar.gz"

          # Re-create archive from extracted directory (preserves original structure)
          tar -czf "$ARCHIVE" -C archive-contents .

          # Re-sign the archive with GPG (binary .sig format to match GoReleaser)
          rm -f "${ARCHIVE}.sig"
          gpg --batch --yes --detach-sign \
            --default-key "${{ steps.import_gpg.outputs.keyid }}" \
            "$ARCHIVE"

      - name: Upload updated assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="dotsecenv_${VERSION#v}_Darwin_${{ matrix.arch }}.tar.gz"

          # Delete old assets and upload new ones
          gh release delete-asset "$VERSION" "$ARCHIVE" --yes || true
          gh release delete-asset "$VERSION" "${ARCHIVE}.sig" --yes || true

          gh release upload "$VERSION" "$ARCHIVE" --clobber
          gh release upload "$VERSION" "${ARCHIVE}.sig" --clobber

      - name: Cleanup secrets
        if: always()
        run: |
          # Clean up any Apple signing secrets that may remain
          rm -f "${{ runner.temp }}/certificate.p12" 2>/dev/null || true
          rm -f "${{ runner.temp }}/notarize.zip" 2>/dev/null || true
          rm -rf "$HOME/.private_keys" 2>/dev/null || true

          # Delete signing keychain if it exists
          if security list-keychains | grep -q "signing.keychain-db"; then
            security delete-keychain "${{ runner.temp }}/signing.keychain-db" 2>/dev/null || true
          fi

  update-checksums:
    needs: notarize-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Download and regenerate checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"

          # Download current checksums, darwin archives, and their signatures
          gh release download "$VERSION" --pattern "checksums.txt" --dir .
          gh release download "$VERSION" --pattern "dotsecenv_*_Darwin_*.tar.gz" --dir .
          gh release download "$VERSION" --pattern "dotsecenv_*_Darwin_*.tar.gz.sig" --dir .

          # Regenerate checksums for darwin archives and signatures
          for file in dotsecenv_*_Darwin_*.tar.gz dotsecenv_*_Darwin_*.tar.gz.sig; do
            # Remove old line, add new checksum
            grep -v "$file" checksums.txt > checksums.txt.tmp || true
            sha256sum "$file" >> checksums.txt.tmp
            mv checksums.txt.tmp checksums.txt
          done

          # Sort checksums file for consistency
          sort checksums.txt -o checksums.txt

      - name: Re-sign and upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"

          # Re-sign checksums (binary .sig format to match GoReleaser)
          rm -f checksums.txt.sig
          gpg --batch --yes --detach-sign \
            --default-key "${{ steps.import_gpg.outputs.keyid }}" \
            checksums.txt

          # Upload updated checksums
          gh release delete-asset "$VERSION" "checksums.txt" --yes || true
          gh release delete-asset "$VERSION" "checksums.txt.sig" --yes || true
          gh release upload "$VERSION" checksums.txt --clobber
          gh release upload "$VERSION" checksums.txt.sig --clobber

      - name: Attest Darwin Archives
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dotsecenv_*_Darwin_*.tar.gz"

  update-homebrew-tap:
    needs: update-checksums
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            homebrew-tap

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: dotsecenv/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - name: Download updated checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release download "$VERSION" --repo dotsecenv/dotsecenv --pattern "checksums.txt" --dir .

      - name: Update cask with correct checksums
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          # Extract Darwin checksums from the updated checksums.txt
          ARM64_SHA=$(grep "dotsecenv_${VERSION_NUM}_Darwin_arm64.tar.gz$" checksums.txt | cut -d' ' -f1)
          X86_64_SHA=$(grep "dotsecenv_${VERSION_NUM}_Darwin_x86_64.tar.gz$" checksums.txt | cut -d' ' -f1)

          echo "ARM64 SHA: $ARM64_SHA"
          echo "X86_64 SHA: $X86_64_SHA"

          # Update the cask file with correct checksums
          CASK_FILE="Casks/dotsecenv.rb"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" "$CASK_FILE"

          # Update arm64 sha256 (on_arm block)
          sed -i "/on_arm do/,/end/{s/sha256 \"[a-f0-9]*\"/sha256 \"${ARM64_SHA}\"/}" "$CASK_FILE"

          # Update x86_64 sha256 (on_intel block for macOS)
          sed -i "/on_macos do/,/on_linux do/{/on_intel do/,/end/{s/sha256 \"[a-f0-9]*\"/sha256 \"${X86_64_SHA}\"/}}" "$CASK_FILE"

          echo "==> Updated cask file:"
          cat "$CASK_FILE"

      - name: Commit and push
        run: |
          VERSION="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dotsecenv.rb
          git commit -m "fix: update Darwin checksums for ${VERSION} (post-notarization)" || echo "No changes to commit"
          git push

  dispatch-packages:
    needs: [goreleaser, update-checksums, update-homebrew-tap]
    runs-on: ubuntu-latest
    # Exposed so wait-publish-packages can watch the just-dispatched run
    # without re-doing the discovery work.
    outputs:
      packages_run_id: ${{ steps.find_packages.outputs.run_id }}
      packages_run_url: ${{ steps.find_packages.outputs.run_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Capture pre-dispatch timestamp
        id: timestamp
        run: |
          # 5s buffer absorbs clock skew between this runner and the
          # satellite's, plus the time between this step and the dispatch.
          echo "dispatch_time=$(date -u -d '5 seconds ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Generate App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: packages

      - name: Trigger packages update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: dotsecenv/packages
          event-type: publish-packages
          client-payload: '{"version": "${{ github.ref_name }}"}'

      - name: Find dispatched packages run and surface link
        id: find_packages
        env:
          SATELLITE_REPO: dotsecenv/packages
          WORKFLOW_FILE: publish.yml
          SINCE: ${{ steps.timestamp.outputs.dispatch_time }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/find-satellite-run.sh

  # Poll the dispatched packages run to completion. The link to the
  # satellite run is already on the dispatch-packages job summary
  # (written by find-satellite-run.sh); this job re-prints it on its
  # own summary along with the final ✅/❌/⏱️ status.
  wait-publish-packages:
    needs: dispatch-packages
    if: needs.dispatch-packages.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token (packages only, actions:read needed)
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: packages

      - name: Watch dotsecenv/packages publish run
        env:
          SATELLITE_REPO: dotsecenv/packages
          RUN_ID: ${{ needs.dispatch-packages.outputs.packages_run_id }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/watch-satellite-run.sh

  # Reusable workflow invocation — e2e-action.yml's 5 matrix jobs run
  # synchronously and surface as checks under this release run, no
  # repository_dispatch + poll machinery needed. Same lifecycle stage
  # as the satellites: the GH release is public, v0 major tag has been
  # moved by goreleaser, so `dotsecenv/dotsecenv@v0` resolves to the
  # just-published action and the released binary is reachable.
  e2e-action:
    needs: update-checksums
    uses: ./.github/workflows/e2e-action.yml
    with:
      version: ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # Monorepo publish jobs (PR 1 of the monorepo migration).
  # Additive only: old repository_dispatch fan-out above remains intact.
  # `continue-on-error: true` so failures in these new jobs do not block the
  # existing pipeline. Status-aware DAG (no draft, sidecar .release-sha,
  # release-complete integrity gate) lands in PR 3.
  # ---------------------------------------------------------------------------

  publish-plugin:
    # Don't push to the satellite (or tag it) if anything earlier in the
    # release chain failed; a half-baked release shouldn't propagate. Run
    # on success-or-skipped so legitimate skips upstream don't block us.
    needs: update-homebrew-tap
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token (plugin only)
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: plugin

      - name: Checkout dotsecenv/plugin satellite
        uses: actions/checkout@v6
        with:
          repository: dotsecenv/plugin
          token: ${{ steps.app-token.outputs.token }}
          path: plugin-satellite
          fetch-depth: 0

      - name: Publish plugin source + tag the satellite
        env:
          SOURCE_DIR: plugin
          SATELLITE_DIR: plugin-satellite
          SATELLITE_REPO: dotsecenv/plugin
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/publish-to-satellite.sh

  # Gates the release on plugin-manager integration testing. Runs
  # `make test-managers-remote` against the just-published plugin
  # satellite (the test clones from github.com/dotsecenv/plugin in
  # Docker, so it exercises the real install path users experience).
  # This replaces the previous post-release.yml flow that ran on the
  # satellite after push but did not surface back to the monorepo run.
  test-plugin-managers:
    needs: publish-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run plugin manager integration tests (remote)
        working-directory: plugin
        run: make test-managers-remote

  # Build + deploy dotsecenv.com to GitHub Pages as part of the release
  # run, so the release graph shows the website publish alongside binary,
  # cask, and plugin publishes. Calls the reusable deploy-website.yml so
  # the build/deploy logic stays single-sourced (deploy-website.yml also
  # fires standalone on out-of-band main-branch website edits).
  #
  # Gated on update-homebrew-tap with success-or-skipped semantics: don't
  # ship updated docs if the binary build / notarize / cask flow failed,
  # but DO ship them if those steps were legitimately skipped.
  deploy-website:
    needs: update-homebrew-tap
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/deploy-website.yml
    permissions:
      contents: read
      pages: write
      id-token: write
