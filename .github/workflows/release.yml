name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Fail fast if a release for this tag already exists with assets.
  # Surfaces tag-moves (same tag re-pushed onto a different commit) in
  # seconds rather than 4+ minutes into goreleaser's upload phase, which
  # would 422 with `already_exists` on every asset. All downstream jobs
  # depend on this (directly or transitively) so we don't burn runner
  # minutes on a release that cannot publish. Tag protection rules are
  # the upstream defense; this job is the in-pipeline guard for cases
  # where the rule was bypassed, disabled, or not yet enforced.
  preflight:
    name: Pre-flight release check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify no existing release for tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # gh api exits non-zero on 404; treat that as the happy path.
          if ! RELEASE_JSON=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>/dev/null); then
            echo "::notice::No existing release for ${TAG}; clear to proceed."
            exit 0
          fi

          ASSET_COUNT=$(echo "$RELEASE_JSON" | jq '.assets | length')
          if [ "$ASSET_COUNT" -gt 0 ]; then
            RELEASE_URL=$(echo "$RELEASE_JSON" | jq -r '.html_url')
            echo "::error::Release ${TAG} already exists with ${ASSET_COUNT} assets: ${RELEASE_URL}"
            echo "::error::Tag protection rules prevent moving or deleting release tags, so the only forward path is a new version."
            echo "::error::To ship a fix: bump the version (next patch) and cut a new tag."
            echo "::error::To withdraw the existing release: retract it (see scripts/retract-version.sh)."
            exit 1
          fi

          echo "::notice::Release ${TAG} exists with no assets (likely partial prior failure); proceeding."

  # Reusable hermetic E2E (harden-runner + strace network-syscall
  # verification). Single source of truth in e2e-hermetic.yml — used by
  # PRs and by the release pipeline so the verification logic doesn't
  # drift between the two.
  e2e-hermetic:
    needs: preflight
    uses: ./.github/workflows/e2e-hermetic.yml

  # Gate the release on each path-scoped CI workflow's pass on this
  # commit. These workflows run on push to main, so the tagged SHA
  # already has runs for whichever workflows' path filters matched.
  # We don't re-run; we wait for existing runs. If a workflow's path
  # filter excluded this SHA, no run exists — we warn and proceed
  # (branch protection + the prior commit's CI is the upstream
  # guarantee in that case).
  #
  # ci-release.yml is intentionally NOT in this matrix: it runs the
  # same goreleaser snapshot that the `goreleaser` job below runs for
  # real. Failing early on ci-release would just duplicate the failure
  # we'd see in `goreleaser` itself.
  #
  # e2e-action-post-release.yml is also NOT in this matrix: it's a
  # POST-release smoke (released action ref + released binary), so by
  # definition it can't have a pre-existing run for the tagged SHA —
  # release.yml workflow_call's it inline (the `e2e-action-post-release`
  # job below) after the release is published.
  wait-ci:
    name: Wait for CI on tagged commit
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
    strategy:
      fail-fast: false
      matrix:
        workflow:
          - ci.yml
          - e2e-install.yml
          - ci-plugin.yml
          - ci-website.yml
          - lint-workflows.yml
    steps:
      - name: Find and watch ${{ matrix.workflow }} on ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          WORKFLOW: ${{ matrix.workflow }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh api \
            "repos/${REPO}/actions/workflows/${WORKFLOW}/runs?head_sha=${SHA}&per_page=1" \
            --jq '.workflow_runs[0].id // empty')

          if [ -z "$RUN_ID" ]; then
            echo "::warning::No ${WORKFLOW} run found for ${SHA} — path filter likely excluded this commit. Proceeding."
            exit 0
          fi

          echo "Watching ${WORKFLOW} run ${RUN_ID}..."
          gh run watch "$RUN_ID" --exit-status --repo "$REPO"

  goreleaser:
    needs: [e2e-hermetic, wait-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Install Signing Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Setup GPG key
        id: setup_gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          GPG_KEY_FILE="${{ runner.temp }}/gpg.key"
          echo "$GPG_PRIVATE_KEY" > "$GPG_KEY_FILE"
          chmod 600 "$GPG_KEY_FILE"
          echo "GPG_KEY_FILE=$GPG_KEY_FILE" >> "$GITHUB_ENV"

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Generate App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            homebrew-tap
            packages

      - name: Install Syft
        uses: anchore/sbom-action@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG_TOKEN: ${{ steps.app-token.outputs.token }}
          GPG_KEY_FILE: ${{ env.GPG_KEY_FILE }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Attest Build Provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

  notarize-macos:
    needs: goreleaser
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="dotsecenv_${VERSION#v}_Darwin_${{ matrix.arch }}.tar.gz"

          # Download archive and extract to separate directory
          gh release download "$VERSION" --pattern "$ARCHIVE" --dir .
          mkdir -p archive-contents
          tar -xzf "$ARCHIVE" -C archive-contents

      - name: Sign and notarize
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/notarize-macos.sh ./archive-contents/dotsecenv

      - name: Re-package and re-sign archive
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="dotsecenv_${VERSION#v}_Darwin_${{ matrix.arch }}.tar.gz"

          # Re-create archive from extracted directory (preserves original structure)
          tar -czf "$ARCHIVE" -C archive-contents .

          # Re-sign the archive with GPG (binary .sig format to match GoReleaser)
          rm -f "${ARCHIVE}.sig"
          gpg --batch --yes --detach-sign \
            --default-key "${{ steps.import_gpg.outputs.keyid }}" \
            "$ARCHIVE"

      - name: Upload updated assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="dotsecenv_${VERSION#v}_Darwin_${{ matrix.arch }}.tar.gz"

          # Delete old assets and upload new ones
          gh release delete-asset "$VERSION" "$ARCHIVE" --yes || true
          gh release delete-asset "$VERSION" "${ARCHIVE}.sig" --yes || true

          gh release upload "$VERSION" "$ARCHIVE" --clobber
          gh release upload "$VERSION" "${ARCHIVE}.sig" --clobber

      - name: Cleanup secrets
        if: always()
        run: |
          # Clean up any Apple signing secrets that may remain
          rm -f "${{ runner.temp }}/certificate.p12" 2>/dev/null || true
          rm -f "${{ runner.temp }}/notarize.zip" 2>/dev/null || true
          rm -rf "$HOME/.private_keys" 2>/dev/null || true

          # Delete signing keychain if it exists
          if security list-keychains | grep -q "signing.keychain-db"; then
            security delete-keychain "${{ runner.temp }}/signing.keychain-db" 2>/dev/null || true
          fi

  update-checksums:
    needs: notarize-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Download and regenerate checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"

          # Download current checksums, darwin archives, and their signatures
          gh release download "$VERSION" --pattern "checksums.txt" --dir .
          gh release download "$VERSION" --pattern "dotsecenv_*_Darwin_*.tar.gz" --dir .
          gh release download "$VERSION" --pattern "dotsecenv_*_Darwin_*.tar.gz.sig" --dir .

          # Regenerate checksums for darwin archives and signatures
          for file in dotsecenv_*_Darwin_*.tar.gz dotsecenv_*_Darwin_*.tar.gz.sig; do
            # Remove old line, add new checksum
            grep -v "$file" checksums.txt > checksums.txt.tmp || true
            sha256sum "$file" >> checksums.txt.tmp
            mv checksums.txt.tmp checksums.txt
          done

          # Sort checksums file for consistency
          sort checksums.txt -o checksums.txt

      - name: Re-sign and upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"

          # Re-sign checksums (binary .sig format to match GoReleaser)
          rm -f checksums.txt.sig
          gpg --batch --yes --detach-sign \
            --default-key "${{ steps.import_gpg.outputs.keyid }}" \
            checksums.txt

          # Upload updated checksums
          gh release delete-asset "$VERSION" "checksums.txt" --yes || true
          gh release delete-asset "$VERSION" "checksums.txt.sig" --yes || true
          gh release upload "$VERSION" checksums.txt --clobber
          gh release upload "$VERSION" checksums.txt.sig --clobber

      - name: Attest Darwin Archives
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dotsecenv_*_Darwin_*.tar.gz"

  update-homebrew-tap:
    needs: update-checksums
    runs-on: ubuntu-latest
    outputs:
      cask_commit_sha: ${{ steps.commit.outputs.cask_commit_sha }}
    steps:
      - name: Generate App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            homebrew-tap

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: dotsecenv/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - name: Download updated checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release download "$VERSION" --repo dotsecenv/dotsecenv --pattern "checksums.txt" --dir .

      # The notarize-macos jobs re-upload the Darwin archives. GitHub
      # Releases is fronted by a CDN that can briefly serve the pre-
      # notarization copy, which makes `brew install` fail with a sha
      # mismatch on whoever fetches in that window. Don't push the cask
      # until the CDN is serving the same bytes that checksums.txt now
      # advertises for both Darwin archives.
      - name: Wait for CDN to serve notarized Darwin archives
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          for arch in arm64 x86_64; do
            ASSET="dotsecenv_${VERSION_NUM}_Darwin_${arch}.tar.gz"
            EXPECTED=$(grep "${ASSET}\$" checksums.txt | cut -d' ' -f1)
            if [ -z "$EXPECTED" ]; then
              echo "::error::No checksum entry for ${ASSET} in checksums.txt"
              exit 1
            fi
            URL="https://github.com/dotsecenv/dotsecenv/releases/download/${VERSION}/${ASSET}"

            deadline=$(( $(date +%s) + 300 ))
            while :; do
              ACTUAL=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
              if [ "$ACTUAL" = "$EXPECTED" ]; then
                echo "${ASSET}: CDN matches expected (${EXPECTED})"
                break
              fi
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "::error::${ASSET}: CDN still stale after 300s (expected ${EXPECTED}, got ${ACTUAL})"
                exit 1
              fi
              echo "${ASSET}: CDN stale (expected ${EXPECTED}, got ${ACTUAL}); retrying in 10s"
              sleep 10
            done
          done

      - name: Update cask with correct checksums
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          # Extract Darwin checksums from the updated checksums.txt
          ARM64_SHA=$(grep "dotsecenv_${VERSION_NUM}_Darwin_arm64.tar.gz$" checksums.txt | cut -d' ' -f1)
          X86_64_SHA=$(grep "dotsecenv_${VERSION_NUM}_Darwin_x86_64.tar.gz$" checksums.txt | cut -d' ' -f1)

          echo "ARM64 SHA: $ARM64_SHA"
          echo "X86_64 SHA: $X86_64_SHA"

          # Update the cask file with correct checksums
          CASK_FILE="Casks/dotsecenv.rb"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" "$CASK_FILE"

          # Update Darwin arm64 sha256 — must be scoped to the on_macos
          # block, otherwise sed also rewrites on_linux/on_arm with the
          # Darwin sha (Linux ARM users would then fail `brew install`).
          sed -i "/on_macos do/,/on_linux do/{/on_arm do/,/end/{s/sha256 \"[a-f0-9]*\"/sha256 \"${ARM64_SHA}\"/}}" "$CASK_FILE"

          # Update Darwin x86_64 sha256 (on_intel block for macOS)
          sed -i "/on_macos do/,/on_linux do/{/on_intel do/,/end/{s/sha256 \"[a-f0-9]*\"/sha256 \"${X86_64_SHA}\"/}}" "$CASK_FILE"

          echo "==> Updated cask file:"
          cat "$CASK_FILE"

      - name: Commit and push
        id: commit
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dotsecenv.rb
          if git commit -m "fix: update Darwin checksums for ${VERSION} (post-notarization)"; then
            git push
            echo "cask_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "No cask changes to commit — skipping push (downstream wait will no-op)"
          fi

  # Push to homebrew-tap fires that repo's own post-release.yml CI
  # (a `brew tap && brew install` smoke). Until now that run was
  # fire-and-forget, so a red tap CI didn't fail the release graph and
  # could silently ship a broken cask between releases. This job waits
  # for the run we just triggered and surfaces its result here.
  wait-homebrew-tap-ci:
    needs: update-homebrew-tap
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Generate App token (homebrew-tap actions:read)
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap

      - name: Wait for dotsecenv/homebrew-tap post-release.yml to pass
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ needs.update-homebrew-tap.outputs.cask_commit_sha }}
        run: |
          set -euo pipefail
          if [ -z "$SHA" ]; then
            echo "::warning::update-homebrew-tap made no commit (cask unchanged); nothing to wait on."
            exit 0
          fi

          # Push-triggered runs take a moment to register; poll until the
          # run for our cask commit appears.
          deadline=$(( $(date +%s) + 120 ))
          RUN_ID=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            RUN_ID=$(gh api \
              "repos/dotsecenv/homebrew-tap/actions/workflows/post-release.yml/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0].id // empty')
            [ -n "$RUN_ID" ] && break
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::No post-release.yml run registered on dotsecenv/homebrew-tap for cask commit ${SHA} within 120s"
            exit 1
          fi

          RUN_URL="https://github.com/dotsecenv/homebrew-tap/actions/runs/${RUN_ID}"
          echo "Watching ${RUN_URL}"
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## homebrew-tap post-release CI"
              echo ""
              echo "Watching [run #${RUN_ID}](${RUN_URL}) for cask commit \`${SHA}\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          gh run watch "$RUN_ID" --exit-status --repo dotsecenv/homebrew-tap

  # Inline status awareness for the homebrew tap: actually run `brew install`
  # against the just-pushed cask. If install fails, the release graph fails
  # red. Replaces the silent fire-and-forget that lets a broken cask ship to
  # users who happen to `brew install dotsecenv` between the push and the
  # next release.
  verify-homebrew-install:
    needs: update-homebrew-tap
    runs-on: macos-latest
    permissions: {}
    steps:
      - name: brew tap and install
        run: |
          set -euxo pipefail
          # Ensure the latest cask is fetched (no stale cache from a previous run)
          brew untap dotsecenv/tap 2>/dev/null || true
          brew tap dotsecenv/tap
          # Match the install command users actually run; brew auto-resolves to
          # the cask in dotsecenv/tap.
          brew install dotsecenv

      - name: Verify version matches release tag
        run: |
          set -euxo pipefail
          installed="$(dotsecenv version | head -1)"
          echo "Installed: $installed"
          expected="${{ github.ref_name }}"
          # `dotsecenv version` is expected to print the version somewhere on the
          # first line; require the tag (without leading 'v') to appear in it.
          case "$installed" in
            *${expected#v}*) ;;
            *)
              echo "::error::Installed version '$installed' does not contain expected tag '${expected#v}'"
              exit 1
              ;;
          esac

      - name: Smoke a basic command
        run: dotsecenv help > /dev/null

  # Push monorepo packages/ source to the dotsecenv/packages satellite
  # (mirroring publish-plugin). Generates retracted.txt from go.mod via
  # the canonical `go mod edit -json | jq` pipeline before pushing, so
  # the satellite receives the freshly-derived retraction list. The push
  # itself triggers the satellite's publish.yml (push: main), which
  # builds apt/yum/arch repos and deploys to get.dotsecenv.com.
  publish-packages:
    # Don't push to the satellite (or tag it) if anything earlier in the
    # release chain failed; a half-baked release shouldn't propagate. Run
    # on success-or-skipped so legitimate skips upstream don't block us.
    needs: [goreleaser, update-checksums, update-homebrew-tap, verify-homebrew-install, wait-homebrew-tap-ci]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Exposed so wait-publish-packages can watch the just-triggered satellite run.
    outputs:
      packages_run_id: ${{ steps.find_packages.outputs.run_id }}
      packages_run_url: ${{ steps.find_packages.outputs.run_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Capture pre-push timestamp
        id: timestamp
        run: |
          # 5s buffer absorbs clock skew between this runner and the
          # satellite's, plus the time between this step and the push.
          echo "push_time=$(date -u -d '5 seconds ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Go (for extract-retracted.sh)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Generate retracted.txt from go.mod
        run: |
          ./scripts/extract-retracted.sh go.mod > packages/retracted.txt
          echo "Retracted versions being published:"
          cat packages/retracted.txt || echo "(none)"

      - name: Generate App token (packages only)
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: packages

      - name: Checkout dotsecenv/packages satellite
        uses: actions/checkout@v6
        with:
          repository: dotsecenv/packages
          token: ${{ steps.app-token.outputs.token }}
          path: packages-satellite
          fetch-depth: 0

      - name: Publish packages source + tag the satellite
        env:
          SOURCE_DIR: packages
          SATELLITE_DIR: packages-satellite
          SATELLITE_REPO: dotsecenv/packages
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED_BY: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: scripts/release/publish-to-satellite.sh

      - name: Find satellite publish.yml run (push-triggered)
        id: find_packages
        env:
          SATELLITE_REPO: dotsecenv/packages
          WORKFLOW_FILE: publish.yml
          SINCE: ${{ steps.timestamp.outputs.push_time }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/find-satellite-run.sh

  # Poll the satellite's publish.yml run to completion. The link to the
  # satellite run is on the publish-packages job summary; this job
  # re-prints it on its own summary along with the final ✅/❌/⏱️ status.
  wait-publish-packages:
    needs: publish-packages
    if: needs.publish-packages.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token (packages only, actions:read needed)
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: packages

      - name: Watch dotsecenv/packages publish run
        env:
          SATELLITE_REPO: dotsecenv/packages
          RUN_ID: ${{ needs.publish-packages.outputs.packages_run_id }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/release/watch-satellite-run.sh

  # Post-release smoke. e2e-action-post-release.yml's 5 matrix jobs run
  # synchronously and surface as checks under this release run. The GH
  # release is public by this point and goreleaser has moved the v0
  # major tag, so `dotsecenv/dotsecenv@v0` resolves to the just-
  # published action and the released binary is reachable for download.
  e2e-action-post-release:
    needs: update-checksums
    uses: ./.github/workflows/e2e-action-post-release.yml
    with:
      version: ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # Monorepo publish jobs (PR 1 of the monorepo migration).
  # Additive only: old repository_dispatch fan-out above remains intact.
  # `continue-on-error: true` so failures in these new jobs do not block the
  # existing pipeline. Status-aware DAG (no draft, sidecar .release-sha,
  # release-complete integrity gate) lands in PR 3.
  # ---------------------------------------------------------------------------

  publish-plugin:
    # Don't push to the satellite (or tag it) if anything earlier in the
    # release chain failed; a half-baked release shouldn't propagate. Run
    # on success-or-skipped so legitimate skips upstream don't block us.
    needs: update-homebrew-tap
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Generate App token (plugin only)
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: plugin

      - name: Checkout dotsecenv/plugin satellite
        uses: actions/checkout@v6
        with:
          repository: dotsecenv/plugin
          token: ${{ steps.app-token.outputs.token }}
          path: plugin-satellite
          fetch-depth: 0

      - name: Publish plugin source + tag the satellite
        env:
          SOURCE_DIR: plugin
          SATELLITE_DIR: plugin-satellite
          SATELLITE_REPO: dotsecenv/plugin
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PUBLISHED_BY: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: scripts/release/publish-to-satellite.sh

  # Gates the release on plugin-manager integration testing. Runs
  # `make test-managers-remote` against the just-published plugin
  # satellite (the test clones from github.com/dotsecenv/plugin in
  # Docker, so it exercises the real install path users experience).
  # This replaces the previous post-release.yml flow that ran on the
  # satellite after push but did not surface back to the monorepo run.
  test-plugin-managers:
    needs: publish-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run plugin manager integration tests (remote)
        working-directory: plugin
        run: make test-managers-remote

  # Build + deploy dotsecenv.com to GitHub Pages as part of the release
  # run, so the release graph shows the website publish alongside binary,
  # cask, and plugin publishes. Calls the reusable deploy-website.yml so
  # the build/deploy logic stays single-sourced (deploy-website.yml also
  # fires standalone on out-of-band main-branch website edits).
  #
  # Gated on wait-homebrew-tap-ci with success-or-skipped semantics: don't
  # ship updated docs until the cask is proven installable on the tap (so
  # the docs never advertise a release whose `brew install` is broken),
  # but DO ship them if upstream steps were legitimately skipped.
  deploy-website:
    needs: wait-homebrew-tap-ci
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/deploy-website.yml
    permissions:
      contents: read
      pages: write
      id-token: write
