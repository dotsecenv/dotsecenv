name: Tag release

on:
  repository_dispatch:
    types: [tag-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag name (e.g. v0.5.0)"
        required: true
      sha:
        description: "Commit SHA to tag (defaults to main)"
        required: false

permissions:
  contents: write

jobs:
  tag:
    name: Tag commit
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.version || github.event.client_payload.version }}
      REF: ${{ inputs.sha || github.event.client_payload.sha || 'main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.REF }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: releasetools/cli@v0

      - name: Create tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: releasetools git::release --push "$TAG"
