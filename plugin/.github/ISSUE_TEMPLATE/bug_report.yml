name: Bug Report
description: Report a bug with the shell plugins
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. cd into directory with .secenv
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - Bash
        - Zsh
        - Fish
    validations:
      required: true

  - type: input
    id: shell-version
    attributes:
      label: Shell Version
      description: Output of `bash --version`, `zsh --version`, or `fish --version`
      placeholder: "zsh 5.9 (x86_64-apple-darwin23.0)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Debian/Ubuntu)
        - Linux (RHEL/CentOS/Fedora)
        - Linux (Arch)
        - Linux (Other)
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - install.sh script
        - Oh My Zsh
        - Zinit
        - Antidote
        - Oh My Bash
        - Fisher (Fish)
        - Manual
        - Other
    validations:
      required: true

  - type: input
    id: dotsecenv-version
    attributes:
      label: dotsecenv CLI Version
      description: Output of `dotsecenv version`
      placeholder: "dotsecenv version v0.1.0 (commit: abc1234)"
    validations:
      required: false

  - type: textarea
    id: secenv-file
    attributes:
      label: ".secenv File Contents (sanitized)"
      description: |
        Share your .secenv file with sensitive values redacted.
        This will be automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
